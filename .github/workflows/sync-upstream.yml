name: Upstream Sync

on:
  schedule:
    - cron: '0 6 * * *'  # Täglich um 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync upstream
        id: sync
        run: |
          git remote add upstream https://github.com/sipeed/picoclaw.git 2>/dev/null || true
          git fetch upstream
          git checkout main
          
          # Prüfe ob Updates vorhanden
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LOCAL_SHA=$(git rev-parse main)
          
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ Bereits synchron"
          else
            git merge upstream/main --no-edit --allow-unrelated-histories || echo "Merge conflicts - manual review needed"
            git push origin main
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "🔄 Updates synchronisiert"
          
            # Tag für Tracking
            TAG="sync-$(date +%Y%m%d-%H%M%S)"
            git tag "$TAG"
            git push origin "$TAG" || true
          fi

      - name: Trigger build on changes
        if: steps.sync.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-arm64.yml',
              ref: 'main'
            })
